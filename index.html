<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetzibeth Design Pro OS</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ff4444;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .main-container {
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 12px;
            width: 95vw;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: space-between;
            align-items: center;
        }

        .tool-group {
            display: flex;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            gap: 4px;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: #888;
            width: 42px;
            height: 42px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: grid;
            place-items: center;
            font-size: 18px;
        }

        .tool-btn.active {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px var(--primary);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #signature-pad {
            display: block;
            width: 100%;
            height: 60vh;
            touch-action: none;
        }

        .btn-action {
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }

        .btn-trash { background: #221111; color: var(--danger); border: 1px solid rgba(255,68,68,0.2); }
        .btn-export { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }

        #sticker-menu {
            display: none;
            position: absolute;
            background: rgba(10, 10, 10, 0.98);
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 18px;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        input[type="file"] { display: none; }

        @media (max-width: 768px) {
            .tool-btn { width: 38px; height: 38px; font-size: 16px; }
            .btn-action span { display: none; }
            #signature-pad { height: 50vh; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="main-container">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" onclick="setTool('pen')" id="btn-pen"><i class="fas fa-pen-nib"></i></button>
                <button class="tool-btn" onclick="setTool('eraser')" id="btn-eraser"><i class="fas fa-eraser"></i></button>
                <button class="tool-btn" onclick="setTool('rect')" id="btn-rect"><i class="fas fa-vector-square"></i></button>
                <button class="tool-btn" onclick="setTool('circle')" id="btn-circle"><i class="fas fa-circle"></i></button>
                <button class="tool-btn" onclick="toggleStickers(event)"><i class="fas fa-icons"></i></button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" onclick="document.getElementById('imageInput').click()" title="Importar Imagen"><i class="fas fa-image"></i></button>
                <button class="tool-btn" onclick="handleVoiceInput()" title="Voz a Texto"><i class="fas fa-microphone"></i></button>
                <button class="tool-btn" onclick="toggleMirror()" id="btn-mirror" title="Espejo"><i class="fas fa-clone"></i></button>
                <button class="tool-btn" onclick="toggleBg()" id="btn-bg" style="color:#fff;"><i class="fas fa-fill-drip"></i></button>
                <input type="color" id="colorPicker" value="#00f2ff" style="width:25px; height:25px; border:none; background:none; cursor:pointer;">
                <input type="range" id="lineWidth" min="1" max="100" value="5" style="width: 45px;">
            </div>

            <div style="display:flex; gap:6px;">
                <button class="tool-btn" style="background:rgba(255,255,255,0.05); color:white;" onclick="undo()"><i class="fas fa-undo"></i></button>
                <button class="btn-action btn-trash" onclick="clearCanvas()"><i class="fas fa-trash-can"></i><span>Borrar</span></button>
                <button class="btn-action btn-export" onclick="handleExport()"><i class="fas fa-save"></i><span>Guardar</span></button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="signature-pad"></canvas>
        </div>

        <input type="file" id="imageInput" accept="image/*" onchange="importImage(event)">

        <div id="sticker-menu">
            <button class="tool-btn" onclick="selectSticker('fa-google')"><i class="fab fa-google"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-github')"><i class="fab fa-github"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-react')"><i class="fab fa-react"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-android')"><i class="fab fa-android"></i></button>
        </div>

        <p style="text-align: center; font-size: 10px; color: var(--primary); opacity: 0.5; margin: 0; letter-spacing: 2px;">
            SYSTEM: JETZIBETH OS v8.0 // <span id="status">ESTADO: LISTO</span>
        </p>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        const status = document.getElementById('status');

        let drawing = false;
        let currentTool = 'pen';
        let isDarkBg = true;
        let isMirror = false;
        let history = []; // Guardará strings base64
        let startPos = { x: 0, y: 0 };
        let snapshot = null;
        let selectedSticker = null;

        // --- SISTEMA DE FONDO ---
        function fillBg() {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset temporal para llenar fondo
            ctx.fillStyle = isDarkBg ? "#000000" : "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            canvas.style.backgroundColor = isDarkBg ? "#000" : "#fff";
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const ratio = window.devicePixelRatio || 1;
            
            // Guardar estado actual antes de redimensionar
            const currentArt = canvas.toDataURL();

            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            ctx.scale(ratio, ratio);
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            fillBg();
            
            const img = new Image();
            img.src = currentArt;
            img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- IMPORTAR IMAGEN ---
        function importImage(e) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // Dibujar imagen centrada
                    const ratio = Math.min(canvas.width / img.width, canvas.height / img.height) * 0.8;
                    const w = (img.width * ratio) / (window.devicePixelRatio || 1);
                    const h = (img.height * ratio) / (window.devicePixelRatio || 1);
                    const x = ((canvas.width / (window.devicePixelRatio || 1)) - w) / 2;
                    const y = ((canvas.height / (window.devicePixelRatio || 1)) - h) / 2;
                    
                    ctx.drawImage(img, x, y, w, h);
                    saveHistory();
                    status.innerText = "IMAGEN IMPORTADA";
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        }

        // --- ACCIONES ---
        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fillBg();
            history = [];
            saveHistory();
            status.innerText = "MEMORIA PURGADA";
        }

        function saveHistory() {
            history.push(canvas.toDataURL());
            if(history.length > 30) history.shift();
        }

        function undo() {
            if (history.length > 1) {
                history.pop();
                const lastState = history[history.length - 1];
                const img = new Image();
                img.src = lastState;
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    fillBg();
                    ctx.drawImage(img, 0, 0, canvas.width/devicePixelRatio, canvas.height/devicePixelRatio);
                };
            } else {
                clearCanvas();
            }
        }

        // --- DIBUJO ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (tool === 'eraser' ? 'eraser' : tool))?.classList.add('active');
        }

        function toggleBg() {
            isDarkBg = !isDarkBg;
            const temp = canvas.toDataURL();
            fillBg();
            const img = new Image();
            img.src = temp;
            img.onload = () => ctx.drawImage(img, 0, 0, canvas.width/devicePixelRatio, canvas.height/devicePixelRatio);
        }

        function toggleMirror() {
            isMirror = !isMirror;
            document.getElementById('btn-mirror').classList.toggle('active');
        }

        function startDrawing(e) {
            drawing = true;
            startPos = getPos(e);
            snapshot = canvas.toDataURL();
            
            if(currentTool === 'sticker') {
                drawSticker(startPos.x, startPos.y);
                drawing = false;
                saveHistory();
                return;
            }
            ctx.beginPath();
            ctx.moveTo(startPos.x, startPos.y);
            e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            ctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
            ctx.lineWidth = lineWidth.value;
            ctx.strokeStyle = colorPicker.value;
            ctx.shadowBlur = (currentTool !== 'eraser') ? 10 : 0;
            ctx.shadowColor = colorPicker.value;

            const execute = (x, y, sx, sy) => {
                if(currentTool === 'pen' || currentTool === 'eraser') {
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } else {
                    const img = new Image();
                    img.src = snapshot;
                    ctx.drawImage(img, 0, 0, canvas.width/devicePixelRatio, canvas.height/devicePixelRatio);
                    ctx.beginPath();
                    if(currentTool === 'rect') ctx.strokeRect(sx, sy, x - sx, y - sy);
                    if(currentTool === 'circle') {
                        const r = Math.sqrt(Math.pow(x-sx, 2) + Math.pow(y-sy, 2));
                        ctx.arc(sx, sy, r, 0, Math.PI*2);
                    }
                    ctx.stroke();
                }
            };

            execute(pos.x, pos.y, startPos.x, startPos.y);
            if(isMirror) {
                const cw = canvas.width / (window.devicePixelRatio || 1);
                execute(cw - pos.x, pos.y, cw - startPos.x, startPos.y);
            }
        }

        function stopDrawing() {
            if(drawing) saveHistory();
            drawing = false;
        }

        // EVENTOS
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        // STICKERS & VOZ (SOPORTE BÁSICO)
        function toggleStickers(e) {
            const menu = document.getElementById('sticker-menu');
            menu.style.display = menu.style.display === 'grid' ? 'none' : 'grid';
            menu.style.left = e.pageX + 'px';
            menu.style.top = (e.pageY - 120) + 'px';
        }

        function selectSticker(icon) {
            selectedSticker = icon;
            currentTool = 'sticker';
            document.getElementById('sticker-menu').style.display = 'none';
        }

        function drawSticker(x, y) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.font = `${lineWidth.value * 6}px "Font Awesome 6 Brands"`;
            ctx.fillStyle = colorPicker.value;
            const chars = {'fa-google': '\uf1a0', 'fa-github': '\uf09b', 'fa-react': '\uf41b', 'fa-android': '\uf17b'};
            ctx.fillText(chars[selectedSticker], x, y);
        }

        function handleVoiceInput() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.lang = 'es-ES';
                status.innerText = "ESCUCHANDO...";
                recognition.onresult = (e) => {
                    const text = e.results[0][0].transcript;
                    ctx.font = `bold ${lineWidth.value * 5}px 'Orbitron'`;
                    ctx.fillStyle = colorPicker.value;
                    ctx.textAlign = "center";
                    ctx.fillText(text.toUpperCase(), (canvas.width/devicePixelRatio)/2, (canvas.height/devicePixelRatio)/2);
                    saveHistory();
                    status.innerText = "ESTADO: LISTO";
                };
                recognition.start();
            } else {
                const t = prompt("Escribe tu texto:");
                if(t) {
                    ctx.font = `bold ${lineWidth.value * 5}px 'Orbitron'`;
                    ctx.fillStyle = colorPicker.value;
                    ctx.fillText(t.toUpperCase(), (canvas.width/devicePixelRatio)/2, (canvas.height/devicePixelRatio)/2);
                    saveHistory();
                }
            }
        }

        async function handleExport() {
            const fCanvas = document.createElement('canvas');
            fCanvas.width = canvas.width; fCanvas.height = canvas.height;
            const fCtx = fCanvas.getContext('2d');
            fCtx.fillStyle = isDarkBg ? "#000" : "#fff";
            fCtx.fillRect(0, 0, fCanvas.width, fCanvas.height);
            fCtx.drawImage(canvas, 0, 0);
            const link = document.createElement('a');
            link.download = 'jetzibeth-masterpiece.png';
            link.href = fCanvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
