<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarrón Pro</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-color: #007bff;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden; /* Evita scroll */
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Barra de herramientas */
        .toolbar {
            background-color: var(--panel-color);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .tool-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="color"] {
            border: none;
            width: 40px;
            height: 40px;
            cursor: pointer;
            background: none;
        }

        input[type="range"] {
            cursor: pointer;
        }

        button {
            background-color: #444;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        button:hover {
            background-color: var(--accent-color);
        }

        button.clear {
            background-color: #d9534f;
        }

        button.clear:hover {
            background-color: #c9302c;
        }

        /* Área del Pizarrón */
        #canvas-container {
            flex-grow: 1;
            position: relative;
            cursor: crosshair;
        }

        canvas {
            display: block;
            background-color: #f0f0f0; /* Fondo del pizarrón */
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="tool-group">
            <label>Color:</label>
            <input type="color" id="colorPicker" value="#000000">
        </div>
        
        <div class="tool-group">
            <label>Grosor:</label>
            <input type="range" id="lineWidth" min="1" max="50" value="5">
            <span id="widthValue">5</span>
        </div>

        <div class="tool-group">
            <button id="eraserBtn">Borrador</button>
            <button id="drawBtn" style="background-color: var(--accent-color);">Lápiz</button>
            <button class="clear" id="clearBtn">Limpiar Todo</button>
        </div>
        
        <div class="tool-group">
            <button id="saveBtn">Descargar PNG</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="whiteboard"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('whiteboard');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const lineWidthInput = document.getElementById('lineWidth');
        const widthValue = document.getElementById('widthValue');
        const clearBtn = document.getElementById('clearBtn');
        const eraserBtn = document.getElementById('eraserBtn');
        const drawBtn = document.getElementById('drawBtn');
        const saveBtn = document.getElementById('saveBtn');

        let painting = false;
        let color = '#000000';
        let isEraser = false;

        // Ajustar tamaño del canvas al iniciar
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - document.querySelector('.toolbar').offsetHeight;
            // Mantener el fondo blanco después de redimensionar
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Lógica de dibujo
        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath(); // Resetear el trazo para que no se unan puntos lejanos
        }

        function draw(e) {
            if (!painting) return;

            ctx.lineWidth = lineWidthInput.value;
            ctx.lineCap = 'round';
            ctx.strokeStyle = isEraser ? '#ffffff' : colorPicker.value;

            // Ajuste para posición exacta del mouse
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Eventos de Mouse
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);

        // Actualizar número de grosor
        lineWidthInput.addEventListener('input', () => {
            widthValue.innerText = lineWidthInput.value;
        });

        // Botones de herramientas
        eraserBtn.addEventListener('click', () => {
            isEraser = true;
            eraserBtn.style.backgroundColor = 'var(--accent-color)';
            drawBtn.style.backgroundColor = '#444';
        });

        drawBtn.addEventListener('click', () => {
            isEraser = false;
            drawBtn.style.backgroundColor = 'var(--accent-color)';
            eraserBtn.style.backgroundColor = '#444';
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("¿Seguro que quieres borrar todo el arte?")) {
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        });

        // Guardar como imagen
        saveBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'mi-dibujo-perro.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
