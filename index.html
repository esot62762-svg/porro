<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetzibeth Design
</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
            position: fixed;
            width: 100%;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .main-container {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 15px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.1);
            width: 95vw;
            max-width: 950px;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-group {
            display: flex;
            background: rgba(0,0,0,0.5);
            padding: 4px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            align-items: center;
            gap: 2px;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: #888;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: grid;
            place-items: center;
            font-size: 16px;
        }

        .tool-btn.active {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        #signature-pad {
            background: #000;
            border-radius: 20px;
            cursor: crosshair;
            width: 100%;
            height: 50vh;
            border: 1px solid rgba(255,255,255,0.08);
            touch-action: none;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .btn {
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-save { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3); }
        .btn-save:active { transform: scale(0.95); }

        /* Menú de Stickers Flotante */
        #sticker-menu {
            display: none;
            position: absolute;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 15px;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="grid-bg" id="grid"></div>

    <div class="main-container">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" onclick="setTool('pen')" id="btn-pen" title="Lápiz"><i class="fas fa-pen-nib"></i></button>
                <button class="tool-btn" onclick="setTool('eraser')" id="btn-eraser" title="Borrador"><i class="fas fa-eraser"></i></button>
                <button class="tool-btn" onclick="setTool('line')" id="btn-line"><i class="fas fa-slash"></i></button>
                <button class="tool-btn" onclick="setTool('rect')" id="btn-rect"><i class="fas fa-vector-square"></i></button>
                <button class="tool-btn" onclick="setTool('circle')" id="btn-circle"><i class="fas fa-circle"></i></button>
                <button class="tool-btn" onclick="toggleStickers(event)" id="btn-sticker" title="Stickers de APIs"><i class="fas fa-icons"></i></button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" onclick="toggleBg()" id="btn-bg" style="color: #fff;"><i class="fas fa-eye-dropper"></i></button>
                <button class="tool-btn" onclick="toggleNeon()" id="btn-neon" style="color: var(--primary);"><i class="fas fa-bolt"></i></button>
                <input type="color" id="colorPicker" value="#00f2ff" onchange="updateGrid()" style="width:25px; border:none; background:none;">
                <input type="range" id="lineWidth" min="1" max="25" value="3" style="width: 50px;">
            </div>
            
            <div class="action-btns" style="display:flex; gap:5px;">
                <button class="btn" style="background:#111; color:#fff;" onclick="undo()"><i class="fas fa-undo"></i></button>
                <button class="btn" style="background:#221111; color:#ff4747;" onclick="clearCanvas()"><i class="fas fa-trash"></i></button>
                <button class="btn btn-save" onclick="handleExport()"><i class="fas fa-cloud-arrow-down"></i> Exportar</button>
            </div>
        </div>

        <canvas id="signature-pad"></canvas>

        <div id="sticker-menu">
            <button class="tool-btn" onclick="selectSticker('fa-google')"><i class="fab fa-google"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-github')"><i class="fab fa-github"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-android')"><i class="fab fa-android"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-apple')"><i class="fab fa-apple"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-whatsapp')"><i class="fab fa-whatsapp"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-react')"><i class="fab fa-react"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-python')"><i class="fab fa-python"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-java')"><i class="fab fa-java"></i></button>
        </div>
        
        <p style="text-align: center; font-size: 10px; opacity: 0.6; margin-top: 10px; letter-spacing: 2px;">
            JETZIBETH MULTI-TOOL OS // NEON-API READY
        </p>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        const stickerMenu = document.getElementById('sticker-menu');
        
        let drawing = false;
        let currentTool = 'pen';
        let isDarkBg = true;
        let isNeon = true;
        let history = [];
        let startPos = { x: 0, y: 0 };
        let snapshot = null;
        let selectedSticker = null;

        function fillInitialBg() {
            ctx.fillStyle = isDarkBg ? "#000000" : "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            canvas.style.background = isDarkBg ? "#000" : "#fff";
        }

        function toggleBg() {
            isDarkBg = !isDarkBg;
            // Capturamos el dibujo sin el fondo actual
            const currentImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
            fillInitialBg();
            ctx.putImageData(currentImg, 0, 0);
            saveHistory();
        }

        function toggleNeon() {
            isNeon = !isNeon;
            document.getElementById('btn-neon').style.opacity = isNeon ? "1" : "0.3";
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const ratio = window.devicePixelRatio || 1;
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            fillInitialBg();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (tool === 'eraser' ? 'eraser' : tool))?.classList.add('active');
            stickerMenu.style.display = 'none';
        }

        function toggleStickers(e) {
            stickerMenu.style.display = stickerMenu.style.display === 'grid' ? 'none' : 'grid';
            stickerMenu.style.left = e.pageX + 'px';
            stickerMenu.style.top = (e.pageY - 100) + 'px';
        }

        function selectSticker(iconClass) {
            selectedSticker = iconClass;
            setTool('sticker');
            stickerMenu.style.display = 'none';
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            drawing = true;
            startPos = getPos(e);
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if(currentTool === 'sticker') {
                drawSticker(startPos.x, startPos.y);
                drawing = false;
                saveHistory();
                return;
            }

            if(currentTool === 'pen' || currentTool === 'eraser') {
                ctx.beginPath();
                ctx.moveTo(startPos.x, startPos.y);
            }
            e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            
            ctx.lineWidth = lineWidth.value;
            ctx.strokeStyle = currentTool === 'eraser' ? (isDarkBg ? "#000" : "#fff") : colorPicker.value;
            
            // Efecto Neon
            if(isNeon && currentTool !== 'eraser') {
                ctx.shadowBlur = 12;
                ctx.shadowColor = colorPicker.value;
            } else {
                ctx.shadowBlur = 0;
            }

            if(currentTool === 'pen' || currentTool === 'eraser') {
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                if(currentTool === 'line') {
                    ctx.moveTo(startPos.x, startPos.y);
                    ctx.lineTo(pos.x, pos.y);
                } else if(currentTool === 'rect') {
                    ctx.strokeRect(startPos.x, startPos.y, pos.x - startPos.x, pos.y - startPos.y);
                } else if(currentTool === 'circle') {
                    const r = Math.sqrt(Math.pow(pos.x-startPos.x,2)+Math.pow(pos.y-startPos.y,2));
                    ctx.arc(startPos.x, startPos.y, r, 0, Math.PI*2);
                }
                ctx.stroke();
            }
        }

        function drawSticker(x, y) {
            ctx.font = `${lineWidth.value * 5}px "Font Awesome 6 Brands"`;
            ctx.fillStyle = colorPicker.value;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            // Usamos el charCode del icono según Font Awesome
            const icons = {'fa-google': '\uf1a0', 'fa-github': '\uf09b', 'fa-android': '\uf17b', 'fa-apple': '\uf179', 'fa-whatsapp': '\uf232', 'fa-react': '\uf41b', 'fa-python': '\uf3e2', 'fa-java': '\uf4e4'};
            ctx.fillText(icons[selectedSticker], x, y);
        }

        function saveHistory() {
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if(history.length > 25) history.shift();
        }

        function stopDrawing() {
            if(drawing) saveHistory();
            drawing = false;
        }

        // Eventos
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        function undo() {
            if (history.length > 1) {
                history.pop();
                ctx.putImageData(history[history.length - 1], 0, 0);
            } else {
                clearCanvas();
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fillInitialBg();
            history = [];
        }

        async function handleExport() {
            const dataUrl = canvas.toDataURL('image/png');
            if (navigator.share) {
                const blob = await (await fetch(dataUrl)).blob();
                const file = new File([blob], 'jetzibeth_design.png', { type: 'image/png' });
                navigator.share({ files: [file], title: 'Amo al sebas' });
            } else {
                const link = document.createElement('a');
                link.download = 'jetzibeth_design.png';
                link.href = dataUrl;
                link.click();
            }
        }

        function updateGrid() {
            document.getElementById('grid').style.backgroundImage = `
                linear-gradient(${colorPicker.value}11 1px, transparent 1px),
                linear-gradient(90deg, ${colorPicker.value}11 1px, transparent 1px)
            `;
        }
    </script>
</body>
</html>
