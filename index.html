<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetzibeth Design </title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            color: white;
            position: fixed;
            width: 100%;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .main-container {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 0 60px rgba(0, 242, 255, 0.15);
            width: 96vw;
            max-width: 1100px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tool-group {
            display: flex;
            background: rgba(0,0,0,0.6);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            gap: 4px;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: #666;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: grid;
            place-items: center;
            font-size: 18px;
        }

        .tool-btn.active {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 15px var(--primary);
        }

        #signature-pad {
            background: #000;
            border-radius: 24px;
            cursor: crosshair;
            width: 100%;
            height: 55vh;
            border: 2px solid rgba(255,255,255,0.05);
            touch-action: none;
        }

        .btn-action {
            border: none;
            padding: 12px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .btn-export { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }
        .btn-trash { background: rgba(255, 0, 0, 0.15); color: #ff4444; border: 1px solid rgba(255,0,0,0.2); }
        .btn-trash:hover { background: #ff0000; color: white; }

        #sticker-menu {
            display: none;
            position: absolute;
            background: rgba(5, 5, 5, 0.98);
            border: 1px solid var(--primary);
            padding: 10px;
            border-radius: 20px;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="grid-bg" id="grid"></div>

    <div class="main-container">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" onclick="setTool('pen')" id="btn-pen"><i class="fas fa-pen-fancy"></i></button>
                <button class="tool-btn" onclick="setTool('eraser')" id="btn-eraser"><i class="fas fa-eraser"></i></button>
                <button class="tool-btn" onclick="setTool('rect')" id="btn-rect"><i class="fas fa-vector-square"></i></button>
                <button class="tool-btn" onclick="setTool('circle')" id="btn-circle"><i class="fas fa-circle"></i></button>
                <button class="tool-btn" onclick="toggleStickers(event)"><i class="fas fa-icons"></i></button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" onclick="startVoiceRecognition()" title="Dictar Nota"><i class="fas fa-microphone"></i></button>
                <button class="tool-btn" onclick="toggleMirror()" id="btn-mirror"><i class="fas fa-arrows-left-right"></i></button>
                <button class="tool-btn" onclick="toggleBg()" id="btn-bg" style="color:#fff;"><i class="fas fa-fill-drip"></i></button>
                <input type="color" id="colorPicker" value="#00f2ff" style="width:30px; height:30px; border:none; background:none; cursor:pointer;">
                <input type="range" id="lineWidth" min="1" max="60" value="4" style="width: 50px;">
            </div>
            
            <div style="display:flex; gap:6px;">
                <button class="tool-btn" style="background:#111; color:white;" onclick="undo()"><i class="fas fa-rotate-left"></i></button>
                <button class="btn-action btn-trash" onclick="clearCanvas()"><i class="fas fa-trash-can"></i> Limpiar</button>
                <button class="btn-action btn-export" onclick="handleExport()"><i class="fas fa-shuttle-space"></i> Exportar</button>
            </div>
        </div>

        <canvas id="signature-pad"></canvas>

        <div id="sticker-menu">
            <button class="tool-btn" onclick="selectSticker('fa-google')"><i class="fab fa-google"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-github')"><i class="fab fa-github"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-react')"><i class="fab fa-react"></i></button>
            <button class="tool-btn" onclick="selectSticker('fa-android')"><i class="fab fa-android"></i></button>
        </div>
        
        <p style="text-align: center; font-size: 10px; color: var(--primary); letter-spacing: 3px; margin: 0;">
            JETZIBETH DESIGN OS // <span id="status">putos</span>
        </p>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        
        let drawing = false;
        let currentTool = 'pen';
        let isDarkBg = true;
        let isMirror = false;
        let history = [];
        let startPos = { x: 0, y: 0 };
        let snapshot = null;
        let selectedSticker = null;

        function fillBg() {
            ctx.save();
            ctx.globalCompositeOperation = 'destination-over';
            ctx.fillStyle = isDarkBg ? "#000000" : "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            canvas.style.background = isDarkBg ? "#000" : "#fff";
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const ratio = window.devicePixelRatio || 1;
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            fillBg();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function toggleBg() {
            isDarkBg = !isDarkBg;
            const currentImg = ctx.getImageData(0, 0, canvas.width, canvas.height);
            fillBg();
            ctx.putImageData(currentImg, 0, 0);
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + (tool === 'eraser' ? 'eraser' : tool))?.classList.add('active');
        }

        function toggleMirror() {
            isMirror = !isMirror;
            document.getElementById('btn-mirror').classList.toggle('active');
        }

        // --- API DE VOZ ---
        function startVoiceRecognition() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'es-ES';
            document.getElementById('status').innerText = "ESCUCHANDO...";
            
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                drawText(text);
                document.getElementById('status').innerText = "SISTEMA ONLINE";
            };
            recognition.start();
        }

        function drawText(text) {
            ctx.font = `bold ${lineWidth.value * 5}px 'Orbitron'`;
            ctx.fillStyle = colorPicker.value;
            ctx.shadowBlur = 15;
            ctx.shadowColor = colorPicker.value;
            ctx.textAlign = "center";
            ctx.fillText(text.toUpperCase(), canvas.width/4, canvas.height/4);
            saveHistory();
        }

        // --- DIBUJO ---
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            drawing = true;
            startPos = getPos(e);
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if(currentTool === 'sticker') {
                drawSticker(startPos.x, startPos.y);
                drawing = false;
                return;
            }
            ctx.beginPath();
            ctx.moveTo(startPos.x, startPos.y);
            e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const pos = getPos(e);
            
            ctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
            ctx.lineWidth = lineWidth.value;
            ctx.strokeStyle = colorPicker.value;
            ctx.shadowBlur = (currentTool !== 'eraser') ? 12 : 0;
            ctx.shadowColor = colorPicker.value;

            const render = (x, y, sx, sy) => {
                if(currentTool === 'pen' || currentTool === 'eraser') {
                    ctx.lineTo(x, y);
                    ctx.stroke();
                } else {
                    ctx.putImageData(snapshot, 0, 0);
                    ctx.beginPath();
                    if(currentTool === 'rect') ctx.strokeRect(sx, sy, x - sx, y - sy);
                    if(currentTool === 'circle') {
                        const r = Math.sqrt(Math.pow(x-sx, 2) + Math.pow(y-sy, 2));
                        ctx.arc(sx, sy, r, 0, Math.PI*2);
                    }
                    ctx.stroke();
                }
            };

            render(pos.x, pos.y, startPos.x, startPos.y);
            if(isMirror) {
                const mx = (canvas.width/2) - pos.x + (canvas.width/2); // Simetría simple
                const msx = (canvas.width/2) - startPos.x + (canvas.width/2);
                render(mx/2, pos.y, msx/2, startPos.y);
            }
        }

        function saveHistory() {
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if(history.length > 25) history.shift();
        }

        function stopDrawing() {
            if(drawing) saveHistory();
            drawing = false;
        }

        // --- TRASH FIX ---
        function clearCanvas() {
            // Limpia todo el área de píxeles
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Vuelve a pintar el fondo inmediatamente para que el usuario no vea el cambio
            fillBg();
            history = [];
            document.getElementById('status').innerText = "MEMORIA PURGADA";
            setTimeout(() => document.getElementById('status').innerText = "SISTEMA ONLINE", 1000);
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        function undo() {
            if (history.length > 1) {
                history.pop();
                ctx.putImageData(history[history.length - 1], 0, 0);
            } else { clearCanvas(); }
        }

        async function handleExport() {
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const eCtx = exportCanvas.getContext('2d');
            eCtx.fillStyle = isDarkBg ? "#000" : "#fff";
            eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            eCtx.drawImage(canvas, 0, 0);
            const link = document.createElement('a');
            link.download = 'jetzibeth-masterpiece.png';
            link.href = exportCanvas.toDataURL();
            link.click();
        }

        function toggleStickers(e) {
            const menu = document.getElementById('sticker-menu');
            menu.style.display = menu.style.display === 'grid' ? 'none' : 'grid';
            menu.style.left = e.pageX + 'px';
            menu.style.top = (e.pageY - 100) + 'px';
        }

        function selectSticker(icon) {
            selectedSticker = icon;
            currentTool = 'sticker';
            document.getElementById('sticker-menu').style.display = 'none';
        }

        function drawSticker(x, y) {
            ctx.globalCompositeOperation = 'source-over';
            ctx.font = `${lineWidth.value * 6}px "Font Awesome 6 Brands"`;
            ctx.fillStyle = colorPicker.value;
            const chars = {'fa-google': '\uf1a0', 'fa-github': '\uf09b', 'fa-react': '\uf41b', 'fa-android': '\uf17b'};
            ctx.fillText(chars[selectedSticker], x, y);
        }
    </script>
</body>
</html>
