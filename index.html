<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetzibeth Designer Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: white;
            position: fixed;
            width: 100%;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .main-container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 15px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            width: 95vw;
            max-width: 900px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .tool-group {
            display: flex;
            background: rgba(0,0,0,0.4);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            align-items: center;
            gap: 5px;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: #666;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: grid;
            place-items: center;
        }

        .tool-btn.active {
            color: var(--primary);
            background: rgba(0, 242, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);
        }

        #signature-pad {
            background: #000; /* Fondo visual inicial */
            border-radius: 18px;
            cursor: crosshair;
            width: 100%;
            height: 450px;
            border: 1px solid rgba(255,255,255,0.05);
            touch-action: none;
        }

        .action-btns { display: flex; gap: 8px; }

        .btn {
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .btn-clear { background: #221111; color: #ff4747; }
        .btn-undo { background: #111; color: #eee; }
        .btn-save { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: white; }

        .config-item { display: flex; align-items: center; gap: 10px; font-size: 11px; font-weight: bold; color: var(--primary); }
        input[type="color"] { width: 25px; height: 25px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="grid-bg" id="grid"></div>

    <div class="main-container">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn active" onclick="setTool('pen')" id="btn-pen" title="Lápiz"><i class="fas fa-pen"></i></button>
                <button class="tool-btn" onclick="setTool('line')" id="btn-line" title="Línea"><i class="fas fa-slash"></i></button>
                <button class="tool-btn" onclick="setTool('rect')" id="btn-rect" title="Rectángulo"><i class="fas fa-vector-square"></i></button>
                <button class="tool-btn" onclick="setTool('circle')" id="btn-circle" title="Círculo"><i class="fas fa-circle"></i></button>
            </div>

            <div class="tool-group">
                <div class="config-item">
                    <button class="tool-btn" onclick="toggleBg()" id="btn-bg" title="Cambiar Fondo" style="color: #fff;">
                        <i class="fas fa-fill-drip"></i>
                    </button>
                    <input type="color" id="colorPicker" value="#00f2ff" onchange="updateGrid()">
                    <input type="range" id="lineWidth" min="1" max="15" value="3" style="width: 60px;">
                </div>
            </div>
            
            <div class="action-btns">
                <button class="btn btn-undo" onclick="undo()" title="Deshacer"><i class="fas fa-undo"></i></button>
                <button class="btn btn-clear" onclick="clearCanvas()"><i class="fas fa-trash"></i></button>
                <button class="btn btn-save" onclick="handleExport()"><i class="fas fa-share-nodes"></i> Guardar</button>
            </div>
        </div>

        <canvas id="signature-pad"></canvas>
        
        <p style="text-align: center; font-size: 9px; opacity: 0.5; margin-top: 10px; letter-spacing: 3px;">
            <i class="fas fa-shield-halved"></i> JETZIBETH ENGINE v3.5 // BACKGROUND PERSISTENCE ENABLED
        </p>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const lineWidth = document.getElementById('lineWidth');
        
        let drawing = false;
        let currentTool = 'pen';
        let startPos = { x: 0, y: 0 };
        let history = [];
        let snapshot = null;
        let isDarkBg = true; // Estado del fondo

        function fillBackground() {
            // Guardar el estado actual del contexto
            ctx.save();
            ctx.globalCompositeOperation = 'destination-over'; // Dibujar detrás de lo existente
            ctx.fillStyle = isDarkBg ? "#000000" : "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
            
            // Actualizar vista visual
            canvas.style.background = isDarkBg ? "#000" : "#fff";
        }

        function toggleBg() {
            isDarkBg = !isDarkBg;
            fillBackground();
            saveToHistory(); // Guardar el cambio de fondo
        }

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const ratio = window.devicePixelRatio || 1;
            
            // Si ya hay dibujo, guardarlo antes de redimensionar
            const tempImage = canvas.toDataURL();

            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            ctx.scale(ratio, ratio);
            
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            fillBackground(); // Pintar el fondo elegido
            
            // Recargar dibujo si existía
            if (history.length > 0) {
                const img = new Image();
                img.src = tempImage;
                img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
            }
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${tool}`).classList.add('active');
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) {
            drawing = true;
            startPos = getPos(e);
            snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
            
            if(currentTool === 'pen') {
                ctx.beginPath();
                ctx.moveTo(startPos.x, startPos.y);
            }
            e.preventDefault();
        }

        function draw(e) {
            if (!drawing) return;
            const currentPos = getPos(e);
            
            ctx.lineWidth = lineWidth.value;
            ctx.strokeStyle = colorPicker.value;
            ctx.shadowBlur = (currentTool === 'pen') ? 10 : 0; // Solo glow en lápiz para no saturar figuras
            ctx.shadowColor = colorPicker.value;

            if (currentTool === 'pen') {
                ctx.lineTo(currentPos.x, currentPos.y);
                ctx.stroke();
            } else {
                ctx.putImageData(snapshot, 0, 0);
                ctx.beginPath();
                if (currentTool === 'line') {
                    ctx.moveTo(startPos.x, startPos.y);
                    ctx.lineTo(currentPos.x, currentPos.y);
                } 
                else if (currentTool === 'rect') {
                    ctx.strokeRect(startPos.x, startPos.y, currentPos.x - startPos.x, currentPos.y - startPos.y);
                } 
                else if (currentTool === 'circle') {
                    const radius = Math.sqrt(Math.pow(currentPos.x - startPos.x, 2) + Math.pow(currentPos.y - startPos.y, 2));
                    ctx.arc(startPos.x, startPos.y, radius, 0, Math.PI * 2);
                }
                ctx.stroke();
            }
            e.preventDefault();
        }

        function saveToHistory() {
            history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
            if(history.length > 20) history.shift();
        }

        function stopDrawing() {
            if(drawing) saveToHistory();
            drawing = false;
        }

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, {passive: false});
        canvas.addEventListener('touchmove', draw, {passive: false});
        canvas.addEventListener('touchend', stopDrawing);

        function undo() {
            if (history.length > 1) {
                history.pop();
                ctx.putImageData(history[history.length - 1], 0, 0);
            } else if (history.length === 1) {
                history.pop();
                clearCanvas();
            }
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            fillBackground();
            history = [];
        }

        function updateGrid() {
            const grid = document.getElementById('grid');
            grid.style.backgroundImage = `
                linear-gradient(${colorPicker.value}11 1px, transparent 1px),
                linear-gradient(90deg, ${colorPicker.value}11 1px, transparent 1px)
            `;
        }

        async function handleExport() {
            // Creamos un canvas temporal para asegurar que el fondo sea sólido en el archivo
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const eCtx = exportCanvas.getContext('2d');
            
            // 1. Pintar fondo sólido
            eCtx.fillStyle = isDarkBg ? "#000000" : "#ffffff";
            eCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            
            // 2. Pintar el dibujo encima
            eCtx.drawImage(canvas, 0, 0);
            
            const dataUrl = exportCanvas.toDataURL('image/png');
            
            if (navigator.share) {
                const blob = await (await fetch(dataUrl)).blob();
                const file = new File([blob], 'firma_jetzibeth.png', { type: 'image/png' });
                navigator.share({ files: [file], title: 'Mi Firma Pro' }).catch(() => {});
            } else {
                const link = document.createElement('a');
                link.download = 'firma_jetzibeth.png';
                link.href = dataUrl;
                link.click();
            }
        }
    </script>
</body>
</html>
